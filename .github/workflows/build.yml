name: build

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p geumgo-core -p geumgo-server

  app-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install Flutter dependencies
        working-directory: app
        run: flutter pub get
      - name: Analyze app sources
        working-directory: app
        run: dart analyze lib test
      - name: Run app tests
        working-directory: app
        run: flutter test

  windows:
    runs-on: windows-latest
    needs: [test-core, app-check]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Build Windows desktop
        working-directory: app
        run: flutter build windows --release
      - name: Package Windows artifact
        shell: pwsh
        run: Compress-Archive -Path app/build/windows/x64/runner/Release/* -DestinationPath geumgo-windows-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: geumgo-windows-x64
          path: geumgo-windows-x64.zip
          retention-days: 14

  linux:
    runs-on: ubuntu-latest
    needs: [test-core, app-check]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux desktop build dependencies
        run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Build Linux desktop
        working-directory: app
        run: flutter build linux --release
      - name: Package Linux artifact
        run: tar czf geumgo-linux-x64.tar.gz -C app/build/linux/x64/release/bundle .
      - uses: actions/upload-artifact@v4
        with:
          name: geumgo-linux-x64
          path: geumgo-linux-x64.tar.gz
          retention-days: 14

  macos:
    runs-on: macos-latest
    needs: [test-core, app-check]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Build macOS desktop
        working-directory: app
        run: flutter build macos --release
      - name: Package macOS artifact
        run: ditto -c -k --sequesterRsrc --keepParent app/build/macos/Build/Products/Release/app.app geumgo-macos.zip
      - uses: actions/upload-artifact@v4
        with:
          name: geumgo-macos
          path: geumgo-macos.zip
          retention-days: 14

  android:
    runs-on: ubuntu-latest
    needs: [test-core, app-check]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Build Android debug APK
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        working-directory: app
        run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        with:
          name: geumgo-android-debug
          path: app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
      - name: Prepare Android release signing
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: app
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          missing=()
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing Android signing secret: %s\n' "${missing[@]}" >&2
            exit 1
          fi

          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks
          {
            printf 'storePassword=%s\n' "$ANDROID_KEYSTORE_PASSWORD"
            printf 'keyPassword=%s\n' "$ANDROID_KEY_PASSWORD"
            printf 'keyAlias=%s\n' "$ANDROID_KEY_ALIAS"
            printf 'storeFile=upload-keystore.jks\n'
          } > android/key.properties
      - name: Build signed Android APK
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: app
        run: flutter build apk --release
      - name: Build signed Android App Bundle
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: app
        run: flutter build appbundle --release
      - uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: geumgo-android
          path: |
            app/build/app/outputs/flutter-apk/app-release.apk
            app/build/app/outputs/bundle/release/app-release.aab
          retention-days: 14

  ios-config:
    runs-on: macos-latest
    needs: [test-core, app-check]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Validate iOS build configuration
        working-directory: app
        run: flutter build ios --release --no-codesign --config-only

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, linux, macos, android, ios-config]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            geumgo-windows-x64.zip
            geumgo-linux-x64.tar.gz
            geumgo-macos.zip
            app-release.apk
            app-release.aab
