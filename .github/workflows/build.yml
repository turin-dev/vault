name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  test-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p geumgo-core -p geumgo-server

  windows:
    runs-on: windows-latest
    needs: test-core
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Build Windows desktop
        working-directory: app
        run: flutter build windows --release
      - name: Package
        shell: pwsh
        run: Compress-Archive -Path app/build/windows/x64/runner/Release/* -DestinationPath geumgo-windows-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: geumgo-windows-x64
          path: geumgo-windows-x64.zip

  linux:
    runs-on: ubuntu-latest
    needs: test-core
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Build Linux desktop
        working-directory: app
        run: flutter build linux --release
      - name: Package
        run: tar czf geumgo-linux-x64.tar.gz -C app/build/linux/x64/release/bundle .
      - uses: actions/upload-artifact@v4
        with:
          name: geumgo-linux-x64
          path: geumgo-linux-x64.tar.gz

  android:
    runs-on: ubuntu-latest
    needs: test-core
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Build APK
        working-directory: app
        run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: geumgo-android
          path: app/build/app/outputs/flutter-apk/app-release.apk

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, linux, android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            geumgo-windows-x64.zip
            geumgo-linux-x64.tar.gz
            app-release.apk
